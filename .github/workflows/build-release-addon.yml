name: Build and Release NVDA Add-on

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate hotkey configs
        shell: pwsh
        run: ./scripts/validate-hotkey-config.ps1

  build:
    needs: validate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build addon artifact
        shell: pwsh
        run: |
          python scripts/build_addon.py --output-dir dist

      - name: Optional detached signature
        if: ${{ secrets.ADDON_SIGNING_KEY_PEM != '' }}
        shell: pwsh
        run: |
          $keyPath = Join-Path $PWD "signing-key.pem"
          [IO.File]::WriteAllText($keyPath, "${{ secrets.ADDON_SIGNING_KEY_PEM }}")
          python scripts/build_addon.py --output-dir dist --signing-key-pem $keyPath
          Remove-Item $keyPath -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nvda-addon-dist
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nvda-addon-dist
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
